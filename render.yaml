services:
  - type: web
    name: adproof-single-service
    env: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_HTTPS
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: true
      - key: PUBLIC_BASE_URL
        sync: false

      # Single-service JSON storage. This is a temporary beta shortcut.
      # Without a Render persistent disk, files may be reset after redeploy/restart.
      - key: STORAGE_ROOT
        value: /opt/render/project/src/storage
      - key: DATA_FILE
        value: /opt/render/project/src/storage/saas-state.json
      - key: AUTH_DB_FILE
        value: /opt/render/project/src/storage/auth-accounts.json
      - key: RUNTIME_FILE
        value: /opt/render/project/src/storage/runtime-sessions.json
      - key: LEADS_FILE
        value: /opt/render/project/src/storage/leads.json
      - key: EMAIL_OUTBOX_FILE
        value: /opt/render/project/src/storage/email-outbox.json
      - key: BACKUP_DIR
        value: /opt/render/project/src/storage/backups
      - key: EVENT_LOG_DIR
        value: /opt/render/project/src/storage/events
      - key: AUDIT_LOG_DIR
        value: /opt/render/project/src/storage/audit
      - key: ALERT_LOG_DIR
        value: /opt/render/project/src/storage/alerts
      - key: DEAD_LETTER_DIR
        value: /opt/render/project/src/storage/dead-letter
      - key: CORRUPTED_DIR
        value: /opt/render/project/src/storage/corrupted

      # Disable separate database services for the 30-day Render trial.
      - key: ENABLE_APP_DB
        value: false
      - key: ENABLE_POSTGRES_STORAGE
        value: false
      - key: AUTH_REQUIRE_DATABASE_FOR_CLIENT_AUTH
        value: false
      - key: CLUSTER_MODE
        value: false
      - key: ENABLE_REDIS_RUNTIME
        value: false
      - key: ENABLE_REDIS_EVENT_QUEUE
        value: false

      # Beta-friendly production startup. Keep strict guard off for this one-service trial.
      - key: STRICT_PRODUCTION_GUARD
        value: false
      - key: REQUIRE_MFA_IN_PRODUCTION
        value: false
      - key: DOCS_PRIVATE
        value: false
      - key: METRICS_REQUIRE_TOKEN_IN_PRODUCTION
        value: false
      - key: SMTP_ENABLED
        value: false
      - key: AUTH_DEBUG_LOGS
        value: true

      # Set these in Render dashboard. Generated values are OK for the beta service.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
