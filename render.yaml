services:
  - type: web
    name: adproof-db-first
    env: node
    plan: free
    buildCommand: npm ci --omit=dev && npm run db:setup
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_HTTPS
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_SSL
        value: true
      - key: ENABLE_APP_DB
        value: true
      - key: ENABLE_POSTGRES_STORAGE
        value: true
      - key: AUTH_REQUIRE_DATABASE_FOR_CLIENT_AUTH
        value: true
      - key: POSTGRES_AUTO_MIGRATE
        value: true
      - key: POSTGRES_BOOTSTRAP_FROM_JSON
        value: true
      - key: POSTGRES_DIRECT_EVENT_WRITE
        value: true
      - key: POSTGRES_SYNC_CONFIG
        value: true
      - key: POSTGRES_SYNC_ANALYTICS
        value: true
      - key: PERSIST_EVENT_STATS_IN_JSON
        value: false
      - key: LOCAL_EVENT_LOG_ENABLED
        value: false
      - key: LOCAL_STATE_WRITE_ENABLED
        value: false
      - key: LOCAL_RUNTIME_WRITE_ENABLED
        value: false
      - key: CLUSTER_MODE
        value: false
      - key: ENABLE_REDIS_RUNTIME
        value: false
      - key: ENABLE_REDIS_EVENT_QUEUE
        value: false
      - key: STRICT_PRODUCTION_GUARD
        value: false
      - key: REQUIRE_MFA_IN_PRODUCTION
        value: false
      - key: DOCS_PRIVATE
        value: false
      - key: METRICS_REQUIRE_TOKEN_IN_PRODUCTION
        value: false
      - key: SMTP_ENABLED
        value: false
      - key: AUTH_DEBUG_LOGS
        value: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: METRICS_TOKEN
        generateValue: true
