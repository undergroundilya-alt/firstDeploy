# AVP v2.1 cluster reverse proxy.
# Put Cloudflare/CDN/WAF in front of this Nginx where possible.
# For public TLS, terminate at Cloudflare/LB or replace this with a 443 server block and real certificates.

proxy_cache_path /var/cache/nginx/avp_sdk levels=1:2 keys_zone=avp_sdk:20m max_size=256m inactive=30m use_temp_path=off;

upstream avp_api_upstream {
    # docker compose service DNS can resolve several avp-api replicas when scaled:
    # docker compose up --scale avp-api=2
    server avp-api:3443;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /healthz {
        proxy_pass http://avp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SDK files are versioned/dynamic and safe for short CDN cache. API endpoints stay no-store.
    location /sdk/ {
        proxy_pass http://avp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache avp_sdk;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-AVP-Cache $upstream_cache_status always;
    }

    location / {
        proxy_pass http://avp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
