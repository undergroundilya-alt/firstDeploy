# Example Nginx reverse proxy for AVP beta SaaS.
# Recommended chain: Cloudflare/CDN/WAF -> Nginx/LB -> 2-3 Node API instances -> Redis/PostgreSQL.
# Replace avp.example.com and certificate paths before production use.

upstream avp_api_upstream {
    server 127.0.0.1:3443;
    keepalive 32;
}

server {
    listen 80;
    server_name avp.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name avp.example.com;

    ssl_certificate     /etc/letsencrypt/live/avp.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/avp.example.com/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location /sdk/ {
        proxy_pass http://avp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_cache_control;
    }

    location / {
        proxy_pass http://avp_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
