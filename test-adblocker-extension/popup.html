<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Local Test AdBlocker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 260px;
      margin: 0;
      padding: 14px;
      background: #111;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px;
      letter-spacing: .2px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .hint {
      color: #aaa;
      font-size: 12px;
      line-height: 1.45;
      margin: 10px 0 0;
    }
    select, button {
      width: 100%;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1d1d1d;
      color: #fff;
      padding: 9px;
      outline: none;
    }
    button {
      cursor: pointer;
      margin-top: 10px;
      background: #2d6cdf;
      border-color: #2d6cdf;
      font-weight: 700;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 26px;
      flex: 0 0 auto;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      transition: .2s;
      border-radius: 999px;
    }
    .slider:before {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #fff;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider { background: #2d6cdf; }
    input:checked + .slider:before { transform: translateX(22px); }
  </style>
</head>
<body>
  <h1>Local Test AdBlocker</h1>

  <div class="row">
    <span>Включить блокировку</span>
    <label class="switch">
      <input id="enabled" type="checkbox">
      <span class="slider"></span>
    </label>
  </div>

  <label for="mode">Режим</label>
  <select id="mode">
    <option value="hybrid">hybrid — скрыть + удалить</option>
    <option value="remove">remove — удалить элемент</option>
    <option value="hide">hide — display:none</option>
    <option value="mutate">mutate — испортить атрибуты</option>
  </select>

  <button id="reload">Обновить текущую вкладку</button>

  <p class="hint">
    Для проверки начального AdBlock-сценария включите расширение и обновите страницу. Для проверки восстановления выберите remove/hybrid.
  </p>

  <script src="popup.js"></script>
</body>
</html>
