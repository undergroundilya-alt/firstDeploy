name: Deploy production

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    name: Test and deploy production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    env:
      NODE_ENV: test
      USE_HTTPS: 'false'
      RENDER_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run secrets:scan
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
      - name: Trigger Render production deploy
        shell: bash
        run: |
          if [ -z "$RENDER_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_PRODUCTION_DEPLOY_HOOK_URL is not configured; tests passed, deploy skipped."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_PRODUCTION_DEPLOY_HOOK_URL"
