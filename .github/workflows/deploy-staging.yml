name: Deploy staging

on:
  push:
    branches: ['staging', 'develop']
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  test-and-deploy:
    name: Test and deploy staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 20
    env:
      NODE_ENV: test
      USE_HTTPS: 'false'
      RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run secrets:scan
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ui
      - name: Trigger Render staging deploy
        shell: bash
        run: |
          if [ -z "$RENDER_STAGING_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_STAGING_DEPLOY_HOOK_URL is not configured; tests passed, deploy skipped."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_STAGING_DEPLOY_HOOK_URL"
